rules.title=Rules
rules.notice=Notice
rules.different_rule_types=There are 5 different rule types:
rules.body=The goal of the game is,;to find a treasure.; ;The only problem is,;nobody knows EXACTLY where it is.;Each only knows a hint.; ;The pirates take turns;and can either; ;1.) Ask another pirate,;if the treasure could be there?; ;If yes, a circle in his;colour is drawn on the tile.; ;If no, a square in his colour;is drawn on the tile AND;the asking pirate has to also reveal;a tile where it cannot be.; ;2.) Claim where the treasure is!; ;If correct, the pirate has won!;Otherwise the pirate is out of the game;and only answers questions automatically.
rules.notice.backgrounds=The treasure is on one of the;following two backgrounds:
rules.notice.backgrounds_list=WATER, FOREST, MOUNTAIN, GRAS, DESERT
rules.notice.near_background=The treasure is within a radius of;up to 1 tile of a background
rules.notice.habitat=The treasure is within a radius of;up to 2 tiles of a habitat
rules.notice.objective=The treasure is within a radius of;up to 2 tiles of an object
rules.notice.color=The treasure is within a radius of;up to 3 tiles of a colour
rules.notice.hard=When level difficulty is hard,;every hint also exists as a NOT variant,;e.g. The treasure does NOT lie within ...

tutorial.title=Tutorial
tutorial.legend.x=Treasure could be here
tutorial.legend.skull=Treasure is NOT here
tutorial.step.one=In TreasureIsland you are a pirate who;wants to find a hidden treasure.; ;The problem: other pirates have;the same goal.; ;Each pirate has been given a hint;where the treasure is located.;But your hint is not unique.; ;So ask the other pirates where;the treasure could be,;combine the answers correctly;and be the first to find the treasure!
tutorial.step.two=The pirates take turns;and can either:; ;1.) Ask another pirate,;if the treasure could be there?; ;If yes, an X in his colour is drawn;on the field (see below).; ;If no, a skull in his colour is drawn;on the field (see below) AND;the asking pirate also has to reveal;a field where the treasure CANNOT be.; ;2.) Claim where the treasure lies!; ;If correct, the pirate has won!;Otherwise the pirate is out of the game;and only answers questions automatically.
tutorial.step.three=Now choose a piece of land and;ask a pirate,;if the treasure could be there.
tutorial.step.three_correct=Arr very good, according to the hint of;the other pirate;the treasure could be there.; ;The colours of the X marks and skulls;tell you who was asked.;Player 1 is red, 2 is blue etc; ;Now it's the next pirate's turn.;He also asks another pirate,;if the treasure could be there.; ;Through the new hints and the knowledge;of which hints are still possible;it becomes clearer where the treasure is.; ;Watch and learn how it works.
tutorial.step.three_incorrect=Arr, the treasure is NOT there!;Now you have to reveal a place,;where the treasure cannot be.;Pay attention to your hint below.
tutorial.step.three_incorrect_2=Now it's the next pirate's turn.;He also asks another pirate,;if the treasure could be there.; ;The colours of the X marks and skulls;tell you who was asked.;Player 1 is red, 2 is blue etc; ;Through the new hints and the knowledge;of which hints are still possible;it becomes clearer where the treasure is.; ;Watch and learn how it works.
tutorial.step.background_rules=The treasure lies on one of the;following two backgrounds:;WATER, FOREST, MOUNTAIN, GRAS, DESERT;The treasure lies within a radius of;up to 1 field of a background;WATER, FOREST, MOUNTAIN, GRAS, DESERT;The treasure lies within a radius of;up to 2 fields of a habitat;BEAR or REDPANDA;The treasure lies within a radius of;up to 2 fields of an object;The treasure lies within a radius of;up to 3 fields of a colour;When level difficulty is hard,;every hint also exists as a NOT variant,;e.g. The treasure does NOT lie within ...
tutorial.step.x=If you want to look at the rule types;again during the game,;press the following button.; ; ; ;With the following button you can;show your treasure hint in detail.; ; ; ;If you think you know the solution,;press the following button and;then on the treasure field.; ; ; ;With pressed mouse button you can;move the level and;zoom with the mouse wheel.; ;Try it out now.
tutorial.step.x_2=When you are done trying out,;click the X button at the bottom right
tutorial.step.menu_start=In the menu you can configure the players and their difficulty;Press a player to change the difficulty.; ;The level difficulty determines whether the NOT rules are;used or not.; ;The level size can also be adjusted with the arrow buttons.

