rules.different_rule_types=Es gibt 5 verschiedene Hinweisarten:
rules.body=Ziel des Spiels ist es,;einen Schatz zu finden.; ;Leider gibt es nur ein Problem,;niemand weiss GENAU, wo er liegt.;Jeder kennt nur seinen Hinweis.; ;Die Piraten sind nacheinander dran;und koennen entweder; ;1.) Einen anderen Piraten befragen,;ob dort der Schatz liegen kann?; ;Falls ja, wird ein Kreis in seiner;Farbe auf das Feld gezeichnet.; ;Falls nein, wird ein Viereck in seiner;Farbe auf das Feld gezeichnet UND;der fragende Pirat muss auch ein Feld,;welches es nicht sein kann, bekannt geben.; ;2.) Behaupten, wo der Schatz liegt!; ;Wenn es korrekt ist, hat der Pirat gewonnen!;Ansonsten ist der Pirat aus dem Spiel;und beantwortet nur noch Fragen automatisch.
rules.notice.backgrounds=Der Schatz liegt in einem der;zwei folgenden Untergruende:
rules.notice.backgrounds_list=WATER, FOREST, MOUNTAIN, GRAS, DESERT
rules.notice.near_background=Der Schatz liegt in einem Umkreis von;bis zu 1 Feld von einem Untergrund
rules.notice.habitat=Der Schatz liegt in einem Umkreis von;bis zu 2 Feldern von einem Habitat
rules.notice.objective=Der Schatz liegt in einem Umkreis von;bis zu 2 Feldern von einem Objekt
rules.notice.color=Der Schatz liegt in einem Umkreis von;bis zu 3 Feldern von einer Farbe
rules.notice.hard=Wenn die Levelschwierigkeitsstufe schwer ist,;dann gibt es jeden Hinweis auch als NICHT Variante,;z.B. Der Schatz liegt NICHT in einem Umkreis von ...

tutorial.title=Tutorial
tutorial.legend.x=Schatz koennte;hier sein
tutorial.legend.skull=Schatz kann;NICHT hier sein
tutorial.step.one=In TreasureIsland seid ihr ein Pirat, der;einen versteckten Schatz finden will.; ;Das Problem ist nur, das auch andere;Piraten, das gleiche Ziel haben.; ;Jeder Pirat hat einen Hinweis bekommen,;wo der Schatz liegt.;Jedoch ist euer Hinweis nicht eineindeutig.; ;Also fragt die anderen Piraten, wo;der Schatz liegen koennte,;kombiniert die Antworten korrekt;und findet als Erster den Schatz!
tutorial.step.two=Die Piraten sind nacheinander dran;und koennen entweder:; ;1.) Einen anderen Piraten befragen,;ob dort der Schatz liegen kann?; ;Falls ja, wird ein X in seiner Farbe;auf das Feld gezeichnet (siehe unten).; ;Falls nein, wird ein Totenkopf in;seiner Farbe auf das Feld gezeichnet;(siehe unten) UND der fragende Pirat;muss auch ein Feld, wo der Schatz;NICHT liegen kann, bekannt geben.; ;2.) Behaupten, wo der Schatz liegt!; ;Wenn es stimmt, hat der Pirat gewonnen!;Ansonsten ist der Pirat aus dem Spiel;und beantwortet nur noch automatisch Fragen.
tutorial.step.three=Waehlt jetzt ein Landstueck aus und;fragt einen Piraten,;ob der Schatz dort liegen koennte.
tutorial.step.three_correct=Arr sehr gut, laut des Hinweises des;anderen Piraten koennte;der Schatz da liegen.; ;Die Farben der X und Totenkoepfe;verraten, wer gefragt wurde.;Spieler 1 ist rot, 2 ist blau etc; ;Jetzt ist der naechste Pirat dran.;Auch er fragt einen anderen Piraten,;ob der Schatz da liegen kann.; ;Durch die neuen Hinweise und das Wissen,;welche Hinweise nur noch in Frage kommen;wird es immer klarer, wo der Schatz liegt.; ;Schaut zu und lernt wie es funktioniert.
tutorial.step.three_incorrect=Arr, da ist der Schatz NICHT!;Jetzt muesst ihr eine Stelle verraten,;wo der Schatz nicht liegen kann.;Achtet auf euren Hinweis unten.
tutorial.step.three_incorrect_2=Jetzt ist der naechste Pirat dran.;Auch er fragt einen anderen Piraten,;ob der Schatz da liegen kann.; ;Die Farben der X und Totenkoepfe;verraten, wer gefragt wurde.;Spieler 1 ist rot, 2 ist blau etc; ;Durch die neuen Hinweise und das Wissen,;welche Hinweise nur noch in Frage kommen;wird es immer klarer, wo der Schatz liegt.; ;Schaut zu und lernt wie es funktioniert.
tutorial.step.background_rules=Der Schatz liegt in einem der;zwei folgenden Untergruende:;WATER, FOREST, MOUNTAIN, GRAS, DESERT;Der Schatz liegt in einem Umkreis von;bis zu 1 Feld von einem Untergrund;WATER, FOREST, MOUNTAIN, GRAS, DESERT;Der Schatz liegt in einem Umkreis von;bis zu 2 Feldern von einem Habitat;BEAR oder REDPANDA;Der Schatz liegt in einem Umkreis von;bis zu 2 Feldern von einem Objekt;Der Schatz liegt in einem Umkreis von;bis zu 3 Feldern von einer Farbe;Wenn die Levelschwierigkeitsstufe schwer ist,;dann gibt es jeden Hinweis auch als NICHT Variante,;z.B. Der Schatz liegt NICHT in einem Umkreis von ...
tutorial.step.x=Solltest du im Spiel noch einmal;dir die Hinweisarten anschauen wollen,;druecke folgenden Button.; ; ; ;Mit folgendem Button kannst du dir;deinen Schatzhinweis genauer anzeigen lassen.; ; ; ;Wenn du denkst, die Loesung zu kennen,;druecke folgenden Button und;dann auf das Schatzfeld.; ; ; ;Mit gedrueckter Maustaste kann;das Level verschoben;und mit dem Mausrad gezoomt werden.; ;Versuche es nun aus.
tutorial.step.x_2=Wenn du fertig mit dem Ausprobieren bist,;klicke auf den X-Button unten rechts
tutorial.step.menu_start=Im Menu kannst du die Spieler und deren Schwierigkeitsstufe einstellen;Druecke auf einen Spieler, um die Schwierigkeitsstufe zu verstellen.; ;Der Spielschwierigkeitsgrad stellt ein, ob die NICHT Regeln auch;benutzt werden oder nicht.; ;Die Levelgroesse kann auch verstellt werden mit den Pfeilbuttons.

